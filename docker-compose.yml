services:
  db:
    image: postgres:16.8-bookworm
    container_name: postgres-clinica
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: minhasenha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    dns:
      - 8.8.8.8
      - 8.8.4.4

  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: clinica-app
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: clinica-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3001:3000"
    depends_on:
      - app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      API_URL: http://app:3000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json

volumes:
  pgdata:
