services:
  db:
    image: postgres:16.8-bookworm
    container_name: postgres-clinica
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: minhasenha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: clinica-app
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
    depends_on:
      - db
    stdin_open: true
    tty: true
    env_file:
      - ./backend/.env
    command: npm run start:dev

volumes:
  pgdata:
